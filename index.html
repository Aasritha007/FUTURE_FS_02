<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRM Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">Aasritha Jerripothula CRM</h1>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="openTab('addLead')">Add Lead</button>
    <button class="tab-btn" onclick="openTab('viewLeads')">View Leads</button>
  </div>

  <!-- Add Lead -->
  <div id="addLead" class="tab-content active">
    <div class="card">
      <h2>Add New Lead</h2>
      <input type="text" id="name" placeholder="Name">
      <input type="email" id="email" placeholder="Email">
      <input type="text" id="status" placeholder="Status">
      <button onclick="addLead()">Add Lead</button>
    </div>
  </div>

  <!-- View Leads -->
  <div id="viewLeads" class="tab-content">
    <div class="card">
      <h2>All Leads</h2>
      <button onclick="getLeads()">Refresh</button>
      <div id="leadList"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
