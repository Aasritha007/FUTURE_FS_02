<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced CRM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>CRM</h2>
    <ul>
      <li onclick="showSection('dashboard')" class="active">Dashboard</li>
      <li onclick="showSection('addLead')">Add Lead</li>
      <li onclick="showSection('leads')">Leads</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <h1>Jerripothula Aasritha</h1>

    <!-- Dashboard -->
    <div id="dashboard" class="section active">
      <div class="cards">
        <div class="card stat">
          <h3>Total Leads</h3>
          <p id="total">0</p>
        </div>
        <div class="card stat">
          <h3>Hot Leads</h3>
          <p id="hot">0</p>
        </div>
        <div class="card stat">
          <h3>Converted</h3>
          <p id="converted">0</p>
        </div>
      </div>
    </div>

    <!-- Add Lead -->
    <div id="addLead" class="section">
      <div class="card">
        <h2>Add Lead</h2>
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        
        <select id="status">
          <option>Hot</option>
          <option>Cold</option>
          <option>Converted</option>
        </select>

        <button onclick="addLead()">Add</button>
      </div>
    </div>

    <!-- Leads -->
    <div id="leads" class="section">
      <div class="card">
        <h2>Leads</h2>
        <input id="search" placeholder="Search..." onkeyup="filterLeads()">
        <button onclick="getLeads()">Refresh</button>
        <div id="leadList"></div>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
